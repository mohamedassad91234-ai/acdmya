<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أكاديمية أهل القرآن والسنة | منصة التسجيل الإلكتروني</title>
  <meta
    name="description"
    content="منصة التسجيل الإلكتروني لأكاديمية أهل القرآن والسنة."
  />
  <style>
    :root {
      --ink: #10251f;
      --muted: #5f6f68;
      --line: rgba(16, 37, 31, 0.14);
      --surface: rgba(255, 255, 255, 0.9);
      --accent: #0f7b63;
      --accent-dark: #095b49;
      --gold: #c99837;
      --paper: #f7f3e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(201, 152, 55, 0.2), transparent 27%),
        radial-gradient(circle at 84% 10%, rgba(15, 123, 99, 0.18), transparent 30%),
        linear-gradient(135deg, #fbf8ef 0%, #eef7f4 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-image:
        linear-gradient(30deg, var(--accent) 12%, transparent 12.5%, transparent 87%, var(--accent) 87.5%, var(--accent)),
        linear-gradient(150deg, var(--accent) 12%, transparent 12.5%, transparent 87%, var(--accent) 87.5%, var(--accent)),
        linear-gradient(30deg, var(--accent) 12%, transparent 12.5%, transparent 87%, var(--accent) 87.5%, var(--accent)),
        linear-gradient(150deg, var(--accent) 12%, transparent 12.5%, transparent 87%, var(--accent) 87.5%, var(--accent));
      background-position: 0 0, 0 0, 32px 56px, 32px 56px;
      background-size: 64px 112px;
      pointer-events: none;
    }

    .shell {
      width: min(100%, 860px);
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    .hero {
      padding: clamp(26px, 6vw, 56px);
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(16, 37, 31, 0.16);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .mark {
      width: clamp(128px, 32vw, 190px);
      height: clamp(128px, 32vw, 190px);
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 14px 34px rgba(15, 123, 99, 0.18);
      border: 4px solid rgba(255, 255, 255, 0.85);
      overflow: hidden;
    }

    .mark img {
      width: 86%;
      height: 86%;
      object-fit: contain;
      display: block;
    }

    .eyebrow {
      display: inline-block;
      margin: 0 0 12px;
      padding: 7px 14px;
      border: 1px solid rgba(201, 152, 55, 0.45);
      border-radius: 999px;
      color: var(--accent-dark);
      background: rgba(201, 152, 55, 0.12);
      font-size: clamp(13px, 3.2vw, 15px);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(31px, 8vw, 58px);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 16px auto 0;
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(17px, 4.2vw, 24px);
      line-height: 1.8;
    }

    .actions {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 26px;
      border: 0;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow: 0 14px 26px rgba(15, 123, 99, 0.25);
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(15, 123, 99, 0.32);
      outline: none;
    }

    .button span {
      font-size: 22px;
    }

    .note {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 700px) {
      .page {
        align-items: flex-start;
        padding: 18px;
      }

      .hero {
        border-radius: 16px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell" aria-label="منصة التسجيل الإلكتروني">
      <div class="hero">
        <div class="mark" aria-hidden="true">
          <img src="logo.png" alt="" />
        </div>
        <p class="eyebrow">منصة التسجيل الإلكتروني</p>
        <h1>أكاديمية أهل القرآن والسنة</h1>
        <p class="subtitle">
          مرحبا بكم في بوابة التسجيل الرسمية. اضغط على زر التسجيل لإدخال بياناتك
          والانضمام إلى برامج الأكاديمية.
        </p>
        <div class="actions">
          <a class="button" href="http://95.216.111.44:8082/Default.aspx" target="_blank" rel="noopener">
            <span aria-hidden="true">↗</span>
            تسجيل البيانات
          </a>
        </div>
      </div>

    </section>
  </main>
</body>
</html>
